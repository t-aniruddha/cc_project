version: "3.9"

networks:
  raft-net:
    driver: bridge

services:

  # ── Frontend (nginx serves static HTML) ──────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - raft-net
    depends_on:
      - gateway

  # ── Gateway ──────────────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    volumes:
      - ./gateway:/app          # bind mount for hot reload
      - /app/node_modules       # keep node_modules from container
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Replica 1 ────────────────────────────────────────────────────────────────
  replica1:
    build: ./replica1
    container_name: replica1
    ports:
      - "5001:5001"
    environment:
      - REPLICA_ID=replica1
      - PORT=5001
      - GATEWAY_URL=http://gateway:4000
    volumes:
      - ./replica1:/app         # bind mount for hot reload
      - /app/node_modules
    networks:
      - raft-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Replica 2 ────────────────────────────────────────────────────────────────
  replica2:
    build: ./replica2
    container_name: replica2
    ports:
      - "5002:5002"
    environment:
      - REPLICA_ID=replica2
      - PORT=5002
      - GATEWAY_URL=http://gateway:4000
    volumes:
      - ./replica2:/app
      - /app/node_modules
    networks:
      - raft-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Replica 3 ────────────────────────────────────────────────────────────────
  replica3:
    build: ./replica3
    container_name: replica3
    ports:
      - "5003:5003"
    environment:
      - REPLICA_ID=replica3
      - PORT=5003
      - GATEWAY_URL=http://gateway:4000
    volumes:
      - ./replica3:/app
      - /app/node_modules
    networks:
      - raft-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5003/health"]
      interval: 5s
      timeout: 3s
      retries: 5
